<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Star-Books</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#dff2ff 0%,#b8e6ff 50%,#cef0ff 100%);min-height:100vh;color:#1a4a6b}
header{background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);border-bottom:1px solid rgba(125,210,255,0.4);padding:16px 5%;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.logo{font-size:26px;font-weight:800;color:#1a7ab5;letter-spacing:1px}.logo span{color:#5bc8f5}
.tagline{font-size:12px;color:#4a9abb;font-weight:600;margin-left:auto}
.search-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.7);border:1.5px solid rgba(91,200,245,0.5);border-radius:10px;padding:10px 18px;margin:28px 5% 0;max-width:640px}
.search-bar input{flex:1;border:none;background:transparent;outline:none;font-size:14px;font-weight:500;color:#1a4a6b;font-family:'Outfit',sans-serif}
.search-bar input::placeholder{color:#7ab8d4}
.search-bar i{color:#5bc8f5;font-size:15px}
.search-go{background:linear-gradient(135deg,#5bc8f5,#1a7ab5);color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s}
.search-go:hover{opacity:.85}
.filter-row{display:flex;gap:8px;padding:16px 5% 0;flex-wrap:wrap}
.filter-btn{background:rgba(255,255,255,0.6);border:1.5px solid rgba(91,200,245,0.4);color:#2a7aa5;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif}
.filter-btn:hover,.filter-btn.on{background:rgba(91,200,245,0.25);border-color:#5bc8f5;color:#1a5a8b}
.section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#2a7aa5;padding:22px 5% 14px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:18px;background:#5bc8f5;border-radius:2px}
.count-badge{background:rgba(91,200,245,0.2);color:#1a7ab5;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:800;margin-left:auto}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;padding:0 5% 32px}
.book-card{background:rgba(255,255,255,0.65);border:1.5px solid rgba(125,210,255,0.4);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s}
.book-card:hover{background:rgba(255,255,255,0.9);border-color:#5bc8f5;transform:translateY(-4px);box-shadow:0 10px 28px rgba(91,200,245,0.25)}
.book-cover{width:100%;height:200px;object-fit:cover;display:block;background:linear-gradient(135deg,#5bc8f5,#1a7ab5)}
.book-cover-placeholder{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#5bc8f5,#1a7ab5);color:rgba(255,255,255,0.6)}
.book-info{padding:11px}
.book-title{font-size:12px;font-weight:800;color:#1a3a5c;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.book-author{font-size:10px;color:#4a9abb;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-year{font-size:10px;color:#7ab8d4;margin-top:3px}
.book-actions{display:flex;gap:6px;margin-top:9px}
.btn-read{flex:1;background:linear-gradient(135deg,#5bc8f5,#1a7ab5);color:#fff;border:none;border-radius:7px;padding:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-read:hover{opacity:.85}
.btn-info{background:rgba(91,200,245,0.15);border:1.5px solid rgba(91,200,245,0.3);color:#1a7ab5;border-radius:7px;padding:7px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-info:hover{background:rgba(91,200,245,0.25)}

/* READER MODAL */
#readerModal{position:fixed;inset:0;background:rgba(0,20,40,0.92);z-index:10000;display:none;flex-direction:column}
#readerModal.open{display:flex}
.reader-header{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border-bottom:1px solid rgba(91,200,245,0.2);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.reader-title{font-size:14px;font-weight:700;color:#e8f4ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.reader-btn{background:rgba(91,200,245,0.15);border:1.5px solid rgba(91,200,245,0.3);color:#b8e8ff;border-radius:7px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
.reader-btn:hover{background:rgba(91,200,245,0.25);color:#fff}
.reader-close{background:rgba(255,80,80,0.15);border-color:rgba(255,80,80,0.3);color:#ffaaaa}
.reader-close:hover{background:rgba(255,80,80,0.3)}
#readerFrame{flex:1;width:100%;border:none;background:#fff}

/* DETAIL MODAL */
#detailModal{position:fixed;inset:0;background:rgba(0,20,40,0.88);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px}
#detailModal.open{display:flex}
.detail-box{background:linear-gradient(135deg,#e8f7ff,#d0efff);border:1.5px solid rgba(91,200,245,0.5);border-radius:18px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:28px}
.detail-top{display:flex;gap:18px;margin-bottom:20px}
.detail-cover{width:110px;height:160px;object-fit:cover;border-radius:10px;flex-shrink:0;border:2px solid rgba(91,200,245,0.3)}
.detail-cover-ph{width:110px;height:160px;border-radius:10px;background:linear-gradient(135deg,#5bc8f5,#1a7ab5);display:flex;align-items:center;justify-content:center;font-size:40px;color:rgba(255,255,255,0.7);flex-shrink:0}
.detail-meta h2{font-size:18px;font-weight:800;color:#1a3a5c;margin-bottom:6px;line-height:1.3}
.detail-meta p{font-size:12px;color:#4a8ab5;margin-bottom:4px}
.detail-desc{font-size:13px;color:#2a5a8b;line-height:1.7;margin-bottom:18px}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.detail-btn{background:linear-gradient(135deg,#5bc8f5,#1a7ab5);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s;display:flex;align-items:center;gap:7px}
.detail-btn:hover{opacity:.85}
.detail-close{background:rgba(91,200,245,0.15);border:1.5px solid rgba(91,200,245,0.3);color:#1a7ab5;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
.detail-close:hover{background:rgba(91,200,245,0.25)}
.loading{text-align:center;padding:48px;color:#4a9abb;font-size:14px;font-weight:600;grid-column:1/-1}
.loading i{display:block;font-size:32px;margin-bottom:12px;color:#5bc8f5;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:#7ab8d4;font-size:13px;grid-column:1/-1}
footer{text-align:center;padding:20px;font-size:11px;color:#7ab8d4;font-weight:600;border-top:1px solid rgba(125,210,255,0.3)}
</style>
</head>
<body>

<header>
  <div class="logo"><i class="fa-solid fa-book-open" style="color:#5bc8f5;margin-right:8px"></i>STAR<span>-BOOKS</span></div>
  <div class="tagline"><i class="fa-solid fa-book"></i> Free eBooks · Open Library</div>
</header>

<div class="search-bar">
  <i class="fa-solid fa-magnifying-glass"></i>
  <input id="searchInput" type="text" placeholder="Search books by title, author, subject…" onkeydown="if(event.key==='Enter')doSearch()"/>
  <button class="search-go" onclick="doSearch()"><i class="fa-solid fa-search"></i> Search</button>
</div>

<div class="filter-row">
  <button class="filter-btn on" onclick="loadSubject('fiction',this)">Fiction</button>
  <button class="filter-btn" onclick="loadSubject('mystery',this)">Mystery</button>
  <button class="filter-btn" onclick="loadSubject('science fiction',this)">Sci-Fi</button>
  <button class="filter-btn" onclick="loadSubject('romance',this)">Romance</button>
  <button class="filter-btn" onclick="loadSubject('horror',this)">Horror</button>
  <button class="filter-btn" onclick="loadSubject('history',this)">History</button>
  <button class="filter-btn" onclick="loadSubject('biography',this)">Biography</button>
  <button class="filter-btn" onclick="loadSubject('philosophy',this)">Philosophy</button>
  <button class="filter-btn" onclick="loadSubject('science',this)">Science</button>
  <button class="filter-btn" onclick="loadSubject('adventure',this)">Adventure</button>
</div>

<div class="section-title">
  Books
  <span class="count-badge" id="countBadge">Loading…</span>
</div>

<div class="books-grid" id="booksGrid">
  <div class="loading"><i class="fa-solid fa-spinner"></i>Loading books…</div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box" id="detailBox"></div>
</div>

<!-- READER MODAL -->
<div id="readerModal">
  <div class="reader-header">
    <span class="reader-title" id="readerTitle">Reading…</span>
    <button class="reader-btn" onclick="window.open(currentReadUrl,'_blank')"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open Full</button>
    <button class="reader-btn reader-close" onclick="closeReader()"><i class="fa-solid fa-xmark"></i> Close</button>
  </div>
  <iframe id="readerFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<footer>Star-Books · Powered by Open Library API · Millions of Free Books</footer>

<script>
let currentReadUrl='';

async function loadSubject(subject,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  const grid=document.getElementById('booksGrid');
  grid.innerHTML='<div class="loading"><i class="fa-solid fa-spinner"></i>Loading books…</div>';
  try{
    const res=await fetch(`https://openlibrary.org/subjects/${encodeURIComponent(subject.replace(/ /g,'_'))}.json?limit=40`);
    const data=await res.json();
    const works=data.works||[];
    document.getElementById('countBadge').textContent=`${works.length} books`;
    renderBooks(works);
  }catch(e){
    grid.innerHTML='<div class="empty"><i class="fa-solid fa-circle-exclamation" style="display:block;font-size:28px;margin-bottom:10px;color:#5bc8f5"></i>Failed to load books. Try again.</div>';
    document.getElementById('countBadge').textContent='Error';
  }
}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  const grid=document.getElementById('booksGrid');
  grid.innerHTML='<div class="loading"><i class="fa-solid fa-spinner"></i>Searching…</div>';
  try{
    const res=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=40`);
    const data=await res.json();
    const docs=(data.docs||[]).map(d=>({
      key:d.key,title:d.title,authors:d.author_name?[{name:d.author_name[0]}]:[],
      cover_id:d.cover_i,first_publish_year:d.first_publish_year,subject:d.subject
    }));
    document.getElementById('countBadge').textContent=`${docs.length} results for "${q}"`;
    renderBooks(docs,true);
  }catch(e){
    grid.innerHTML='<div class="empty">Search failed. Try again.</div>';
  }
}

function renderBooks(works,isSearch=false){
  const grid=document.getElementById('booksGrid');
  grid.innerHTML='';
  if(!works.length){grid.innerHTML='<div class="empty">No books found.</div>';return}
  works.forEach(book=>{
    const coverId=book.cover_id||(book.covers?.[0]);
    const coverUrl=coverId?`https://covers.openlibrary.org/b/id/${coverId}-M.jpg`:null;
    const author=isSearch?(book.authors?.[0]?.name||'Unknown'):(book.authors?.[0]?.name||'Unknown');
    const year=book.first_publish_year||'';
    const card=document.createElement('div');card.className='book-card';
    card.innerHTML=`
      ${coverUrl?`<img class="book-cover" src="${coverUrl}" alt="${book.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="book-cover-placeholder" style="display:none"><i class="fa-solid fa-book"></i></div>`:`<div class="book-cover-placeholder"><i class="fa-solid fa-book"></i></div>`}
      <div class="book-info">
        <div class="book-title">${book.title||'Untitled'}</div>
        <div class="book-author"><i class="fa-solid fa-pen-nib" style="font-size:9px"></i> ${author}</div>
        ${year?`<div class="book-year"><i class="fa-solid fa-calendar" style="font-size:9px"></i> ${year}</div>`:''}
        <div class="book-actions">
          <button class="btn-read" onclick="event.stopPropagation();readBook('${book.key}','${(book.title||'').replace(/'/g,"\\'")}')"><i class="fa-solid fa-book-open"></i> Read</button>
          <button class="btn-info" onclick="event.stopPropagation();showDetail('${book.key}','${(book.title||'').replace(/'/g,"\\'")}','${author.replace(/'/g,"\\'")}','${year}','${coverId||''}')"><i class="fa-solid fa-info"></i></button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

async function readBook(key,title){
  const olKey=key.startsWith('/')?key:`/works/${key}`;
  const readUrl=`https://openlibrary.org${olKey}`;
  currentReadUrl=readUrl;
  document.getElementById('readerTitle').textContent=title||'Reading…';
  document.getElementById('readerFrame').src=readUrl;
  document.getElementById('readerModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeReader(){
  document.getElementById('readerModal').classList.remove('open');
  document.getElementById('readerFrame').src='';
  document.body.style.overflow='';
}

async function showDetail(key,title,author,year,coverId){
  const box=document.getElementById('detailBox');
  box.innerHTML='<div class="loading"><i class="fa-solid fa-spinner"></i>Loading details…</div>';
  document.getElementById('detailModal').classList.add('open');
  try{
    const olKey=key.startsWith('/')?key:`/works/${key}`;
    const res=await fetch(`https://openlibrary.org${olKey}.json`);
    const data=await res.json();
    const desc=typeof data.description==='string'?data.description:(data.description?.value||'No description available.');
    const coverUrl=coverId?`https://covers.openlibrary.org/b/id/${coverId}-L.jpg`:null;
    const subjects=(data.subjects||[]).slice(0,5).join(', ');
    box.innerHTML=`
      <div class="detail-top">
        ${coverUrl?`<img class="detail-cover" src="${coverUrl}" alt="${title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="detail-cover-ph" style="display:none"><i class="fa-solid fa-book"></i></div>`:`<div class="detail-cover-ph"><i class="fa-solid fa-book"></i></div>`}
        <div class="detail-meta">
          <h2>${title||'Untitled'}</h2>
          <p><i class="fa-solid fa-pen-nib" style="font-size:10px"></i> ${author||'Unknown'}</p>
          ${year?`<p><i class="fa-solid fa-calendar" style="font-size:10px"></i> ${year}</p>`:''}
          ${subjects?`<p style="margin-top:8px;font-size:10px;color:#7ab8d4">${subjects}</p>`:''}
        </div>
      </div>
      <div class="detail-desc">${desc.slice(0,600)}${desc.length>600?'…':''}</div>
      <div class="detail-actions">
        <button class="detail-btn" onclick="closeDetail();readBook('${key}','${title.replace(/'/g,"\\'")}')"><i class="fa-solid fa-book-open"></i> Read Now</button>
        <button class="detail-btn" style="background:rgba(91,200,245,0.15);color:#1a7ab5;border:1.5px solid rgba(91,200,245,0.3)" onclick="window.open('https://openlibrary.org${key.startsWith('/')?key:'/works/'+key}','_blank')"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open Library</button>
        <button class="detail-close" onclick="closeDetail()">Close</button>
      </div>`;
  }catch(e){
    box.innerHTML=`<div style="text-align:center;padding:24px;color:#4a9abb">Failed to load details.<br><button class="detail-close" style="margin-top:14px" onclick="closeDetail()">Close</button></div>`;
  }
}

function closeDetail(){document.getElementById('detailModal').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeReader();closeDetail()}});
loadSubject('fiction',document.querySelector('.filter-btn.on'));
</script>
</body>
</html>
