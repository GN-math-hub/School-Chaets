<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Star-News</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#60a5fa;--accent2:#a78bfa;--accent3:#f472b6;
  --bg:#080810;--bg2:#0d0d1a;
  --surface:#12121f;--surface2:#1a1a2e;--surface3:#22223a;
  --text:#f0f0f8;--text2:#9090b0;--text3:#4a4a6a;
  --border:#1e1e35;--border2:#2a2a45;
  --r:12px;--ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --hdr-h:58px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
}
html,body{overflow-x:hidden;max-width:100vw;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100svh;line-height:1.5}
body::before{content:'';position:fixed;top:-30%;left:-20%;width:60%;height:70%;background:radial-gradient(ellipse,rgba(96,165,250,.04) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-20%;right:-15%;width:50%;height:60%;background:radial-gradient(ellipse,rgba(244,114,182,.03) 0%,transparent 70%);pointer-events:none;z-index:0}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;height:calc(var(--hdr-h) + var(--st));padding-top:var(--st);z-index:500;display:flex;align-items:center;padding-left:calc(14px + var(--sl));padding-right:calc(14px + var(--sr));gap:10px;background:rgba(8,8,16,.95);border-bottom:1px solid var(--border);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:7px;flex-shrink:0;cursor:pointer}
.logo i{font-size:17px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.h-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .15s;flex-shrink:0}
.h-btn:active{background:var(--surface3);color:var(--text)}
.h-btn.on{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.35);color:var(--accent)}
.live-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#ef4444;font-size:9px;font-weight:800;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.8px}
.live-dot{width:6px;height:6px;background:#ef4444;border-radius:50%;animation:livepulse 1.2s ease-in-out infinite;flex-shrink:0}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* setup screen removed */

/* MAIN */
#mainWrap{padding-top:calc(var(--hdr-h) + var(--st));padding-bottom:calc(20px + var(--sb));display:none}

/* SEARCH BAR */
.search-bar{display:flex;gap:8px;padding:14px calc(14px + var(--sl)) 0}
.search-inp-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;padding:0 14px;height:42px;transition:border-color .2s}
.search-inp-wrap:focus-within{border-color:var(--accent)}
.search-inp-wrap i{color:var(--text3);font-size:13px;flex-shrink:0}
.search-inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;caret-color:var(--accent)}
.search-inp::placeholder{color:var(--text3)}
.search-go{height:42px;padding:0 14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .2s}
.search-go:active{opacity:.85}

/* CATEGORY TABS */
.cat-scroll{display:flex;gap:5px;overflow-x:auto;padding:12px calc(14px + var(--sl)) 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;background:var(--surface2);border:1px solid var(--border2);color:var(--text3);padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.cat-tab.on{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.4);color:var(--accent)}
.cat-tab:active{opacity:.7}

/* CONTENT */
.content-area{padding:16px calc(14px + var(--sl)) 0}

/* HERO CARD */
.hero-card{width:100%;border-radius:16px;overflow:hidden;position:relative;cursor:pointer;background:var(--surface2);border:1px solid var(--border);margin-bottom:16px;transition:transform .15s}
.hero-card:active{transform:scale(.99)}
.hero-img{width:100%;height:210px;object-fit:cover;display:block;background:var(--surface3)}
.hero-img-ph{width:100%;height:210px;background:linear-gradient(135deg,var(--surface2),var(--surface3));display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3)}
.hero-grad{position:absolute;bottom:0;left:0;right:0;height:75%;background:linear-gradient(to top,rgba(0,0,0,.98) 0%,rgba(0,0,0,.5) 50%,transparent 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:14px 14px 16px}
.hero-source-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.hero-source{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.2);padding:2px 7px;border-radius:4px}
.hero-cat-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 7px;border-radius:4px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);background:rgba(255,255,255,.05)}
.hero-time{font-size:9px;color:rgba(255,255,255,.4);margin-left:auto}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5vw,28px);letter-spacing:.3px;line-height:1.05;color:#fff;margin-bottom:4px}
.hero-desc{font-size:11px;color:rgba(255,255,255,.55);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* SECTION */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:7px}
.sec-bar{width:2px;height:13px;background:linear-gradient(to bottom,var(--accent),var(--accent3));border-radius:1px;flex-shrink:0}
.section{margin-bottom:22px}

/* NEWS LIST CARD */
.news-list{display:flex;flex-direction:column;gap:8px}
.news-card{display:flex;gap:11px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.news-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--accent),var(--accent2));opacity:0;transition:opacity .2s}
.news-card:active{border-color:rgba(96,165,250,.3);background:var(--surface2)}
.news-card:active::before{opacity:1}
.news-card-img{width:80px;height:80px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface3);border:1px solid var(--border)}
.news-card-img-ph{width:80px;height:80px;border-radius:8px;flex-shrink:0;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text3)}
.news-card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.news-card-meta{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap}
.news-source{font-size:9px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.8px}
.news-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);flex-shrink:0}
.news-time{font-size:9px;color:var(--text3);font-weight:600}
.news-cat{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:1px 5px;border-radius:3px;background:var(--surface3);border:1px solid var(--border);color:var(--text3);margin-left:auto}
.news-title{font-size:12px;font-weight:700;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.news-footer{display:flex;align-items:center;justify-content:space-between}
.news-read-btn{font-size:9px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:4px}
.news-save-btn{width:26px;height:26px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.news-save-btn:active,.news-save-btn.on{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:var(--accent)}

/* ROW */
.news-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.news-row::-webkit-scrollbar{display:none}
.row-card{flex:0 0 170px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s;scroll-snap-align:start}
.row-card:active{transform:scale(.97);border-color:rgba(96,165,250,.3)}
.row-card-img{width:100%;height:100px;object-fit:cover;background:var(--surface3);display:block}
.row-card-img-ph{width:100%;height:100px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--text3)}
.row-card-body{padding:9px 10px 11px}
.row-card-source{font-size:8px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.row-card-title{font-size:11px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.row-card-time{font-size:9px;color:var(--text3);margin-top:5px}

/* SKELETONS */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-hero{height:210px;border-radius:16px;margin-bottom:16px}
.sk-card{height:102px;border-radius:12px}
.sk-row{flex:0 0 170px;height:190px;border-radius:12px;flex-shrink:0}

/* READER MODAL */
#readerModal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:flex-end;justify-content:center;z-index:1000}
#readerModal.open{display:flex}
#readerBox{width:100%;max-width:640px;background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--border2);max-height:94svh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .38s var(--spring);scrollbar-width:thin}
#readerModal.open #readerBox{transform:translateY(0)}
.reader-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.reader-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--surface3)}
.reader-info{padding:16px 16px 6px}
.reader-meta{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.reader-source{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);padding:2px 8px;border-radius:5px}
.reader-time{font-size:10px;color:var(--text3);font-weight:600}
.reader-cat{font-size:9px;font-weight:700;text-transform:uppercase;background:var(--surface3);border:1px solid var(--border);color:var(--text3);padding:2px 7px;border-radius:4px;letter-spacing:.6px}
.reader-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,6vw,30px);letter-spacing:.4px;line-height:1.05;margin-bottom:10px}
.reader-desc{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:16px;padding:0 16px}
.reader-actions{display:flex;gap:8px;padding:0 16px 20px;flex-wrap:wrap}
.reader-btn{padding:11px 18px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.btn-read-full{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;flex:1;justify-content:center}
.btn-read-full:active{opacity:.85}
.btn-save-art{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.btn-save-art:active,.btn-save-art.on{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.35);color:var(--accent)}
.btn-share{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.btn-share:active{background:var(--surface3)}
.close-btn{position:fixed;top:calc(10px + var(--st));right:12px;width:34px;height:34px;background:rgba(8,8,16,.92);border:1px solid var(--border2);color:var(--text);border-radius:9px;font-size:13px;cursor:pointer;z-index:1001;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px)}

/* SAVED PANEL */
#savedPanel{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:flex-end;justify-content:center;z-index:1000}
#savedPanel.open{display:flex}
#savedBox{width:100%;max-width:640px;background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--border2);max-height:86svh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .38s var(--spring);scrollbar-width:thin}
#savedPanel.open #savedBox{transform:translateY(0)}
.saved-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.saved-hd-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.8px;display:flex;align-items:center;gap:8px}
.saved-hd-close{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:8px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.saved-body{padding:14px 14px 20px}

/* EMPTY / LOAD MORE */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-ico{font-size:40px;margin-bottom:12px;opacity:.3;display:block}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text2);letter-spacing:1px;margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.6;max-width:260px;margin:0 auto}
.retry-btn{margin-top:14px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:9px 20px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.retry-btn:active{border-color:var(--accent);color:var(--accent)}
.load-more-btn{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border2);padding:12px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:1px;font-family:'DM Sans',sans-serif;margin-top:6px}
.load-more-btn:active{border-color:rgba(96,165,250,.4);color:var(--accent)}
.load-more-btn:disabled{opacity:.4;cursor:not-allowed}

/* SPINNER / TOAST */
.spinner{width:22px;height:22px;border:2px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(14px + var(--sb));left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);color:var(--text);padding:10px 18px;border-radius:20px;border:1px solid var(--border2);z-index:30000;opacity:0;transition:all .3s var(--spring);font-weight:600;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap;backdrop-filter:blur(12px)}
.toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>



<!-- HEADER -->
<header id="mainHeader">
  <div class="logo" onclick="resetHome()"><i class="fa-solid fa-newspaper"></i>Star-News</div>
  <div class="hdr-right">
    <div class="live-badge" id="liveBadge" style="display:none"><div class="live-dot"></div>Live</div>
    <button class="h-btn" id="savedBtn" onclick="openSaved()"><i class="fa-regular fa-bookmark"></i></button>
    <button class="h-btn" id="searchToggleBtn" onclick="toggleSearchBar()"><i class="fa-solid fa-magnifying-glass"></i></button>
  </div>
</header>

<!-- MAIN -->
<div id="mainWrap" style="display:block">
  <div class="search-bar" id="searchBar" style="display:none">
    <div class="search-inp-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input class="search-inp" id="searchInput" type="search" placeholder="Search news, topics, people…" autocomplete="off"/>
    </div>
    <button class="search-go" onclick="doSearch()"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
  </div>
  <div class="cat-scroll" id="catTabs"></div>
  <div class="content-area" id="contentArea">
    <div class="skeleton sk-hero"></div>
    <div class="news-list">
      <div class="skeleton sk-card"></div>
      <div class="skeleton sk-card"></div>
      <div class="skeleton sk-card"></div>
    </div>
  </div>
</div>

<!-- READER -->
<div id="readerModal" onclick="if(event.target===this)closeReader()">
  <button class="close-btn" onclick="closeReader()"><i class="fa-solid fa-xmark"></i></button>
  <div id="readerBox" onclick="event.stopPropagation()">
    <div class="reader-handle"></div>
    <div id="readerImgWrap"></div>
    <div class="reader-info">
      <div class="reader-meta" id="readerMeta"></div>
      <div class="reader-title" id="readerTitle"></div>
    </div>
    <p class="reader-desc" id="readerDesc"></p>
    <div class="reader-actions">
      <button class="reader-btn btn-read-full" onclick="openFullArticle()"><i class="fa-solid fa-arrow-up-right-from-square"></i> Read Full Article</button>
      <button class="reader-btn btn-save-art" id="readerSaveBtn" onclick="toggleSaveFromReader()"><i class="fa-regular fa-bookmark"></i></button>
      <button class="reader-btn btn-share" onclick="shareArticle()"><i class="fa-solid fa-share-nodes"></i></button>
    </div>
  </div>
</div>

<!-- SAVED -->
<div id="savedPanel" onclick="if(event.target===this)closeSaved()">
  <div id="savedBox" onclick="event.stopPropagation()">
    <div class="saved-hd">
      <div class="saved-hd-title"><i class="fa-solid fa-bookmark" style="font-size:16px;color:var(--accent)"></i> Saved Articles</div>
      <button class="saved-hd-close" onclick="closeSaved()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="saved-body" id="savedBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const THENEWSAPI_BASE='https://api.thenewsapi.com/v1';
const RSS_PROXY='https://api.allorigins.win/get?url=';

const CATEGORIES=[
  {id:'general',   label:'🌍 Top Stories'},
  {id:'tech',      label:'💻 Tech'},
  {id:'business',  label:'📈 Business'},
  {id:'politics',  label:'🏛️ Politics'},
  {id:'sports',    label:'⚽ Sports'},
  {id:'science',   label:'🔬 Science'},
  {id:'health',    label:'❤️ Health'},
  {id:'entertainment',label:'🎬 Entertainment'},
];

const GOOGLE_RSS={
  general:'https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en',
  tech:'https://news.google.com/rss/search?q=technology&hl=en-US&gl=US&ceid=US:en',
  business:'https://news.google.com/rss/search?q=business+economy&hl=en-US&gl=US&ceid=US:en',
  politics:'https://news.google.com/rss/search?q=politics&hl=en-US&gl=US&ceid=US:en',
  sports:'https://news.google.com/rss/search?q=sports&hl=en-US&gl=US&ceid=US:en',
  science:'https://news.google.com/rss/search?q=science+space&hl=en-US&gl=US&ceid=US:en',
  health:'https://news.google.com/rss/search?q=health+medicine&hl=en-US&gl=US&ceid=US:en',
  entertainment:'https://news.google.com/rss/search?q=entertainment+movies&hl=en-US&gl=US&ceid=US:en',
};

const API_KEY='c66011d6b45d46eabce3707234524cf4';
const USE_RSS=false;
let currentCat='general';
let currentArticle=null;
let savedArticles=[];
try{savedArticles=JSON.parse(localStorage.getItem('snSaved')||'[]');}catch(e){}
let currentPage=1;
let hasMore=false;
let isLoading=false;
let searchMode=false;

// AUTO-LAUNCH on page load
window.addEventListener('DOMContentLoaded', initApp);

function initApp(){
  buildCatTabs();
  loadCategory('general');
  document.getElementById('liveBadge').style.display='inline-flex';
}

function buildCatTabs(){
  const c=document.getElementById('catTabs');c.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-tab'+(cat.id==='general'?' on':'');
    btn.dataset.id=cat.id;btn.textContent=cat.label;
    btn.onclick=()=>{
      document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');currentCat=cat.id;searchMode=false;
      loadCategory(cat.id);
    };
    c.appendChild(btn);
  });
}

function resetHome(){
  searchMode=false;
  document.getElementById('searchBar').style.display='none';
  document.getElementById('searchToggleBtn').classList.remove('on');
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.toggle('on',b.dataset.id==='general'));
  loadCategory('general');
}

async function loadCategory(cat,reset=true){
  if(isLoading)return;
  isLoading=true;currentCat=cat;
  currentPage=reset?1:currentPage+1;
  const area=document.getElementById('contentArea');
  if(reset){
    area.innerHTML=`
      <div class="skeleton sk-hero"></div>
      <div class="news-list">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>`;
  }
  try{
    const articles=USE_RSS?await fetchRSS(cat):await fetchTheNewsAPI(cat,currentPage).catch(()=>fetchRSS(cat));
    if(reset)area.innerHTML='';
    if(!articles.length&&reset){
      area.innerHTML=`<div class="empty-state"><i class="fa-solid fa-satellite-dish empty-ico"></i><div class="empty-title">No Articles Found</div><p class="empty-sub">Try a different category or check your connection</p><button class="retry-btn" onclick="loadCategory('${cat}')"><i class="fa-solid fa-rotate"></i> Retry</button></div>`;
      isLoading=false;return;
    }
    renderArticles(articles,area,reset);
  }catch(e){
    if(reset)area.innerHTML=`<div class="empty-state"><i class="fa-solid fa-wifi empty-ico"></i><div class="empty-title">Connection Error</div><p class="empty-sub">Check your internet and try again</p><button class="retry-btn" onclick="loadCategory('${cat}')"><i class="fa-solid fa-rotate"></i> Retry</button></div>`;
  }
  isLoading=false;
}

async function fetchTheNewsAPI(cat,page=1){
  const params=new URLSearchParams({api_token:API_KEY,categories:cat,language:'en',page,limit:25});
  const apiUrl=`${THENEWSAPI_BASE}/news/top?${params}`;
  // Route through allorigins proxy to bypass CORS
  const res=await fetch(`${RSS_PROXY}${encodeURIComponent(apiUrl)}`);
  const outer=await res.json();
  const data=JSON.parse(outer.contents);
  if(data.error)throw new Error(data.error);
  hasMore=!!(data.meta?.found&&(page*25)<data.meta.found);
  return(data.data||[]).map(a=>({
    title:a.title,description:a.description||a.snippet||'',
    url:a.url,image:a.image_url||null,
    source:a.source||extractDomain(a.url),
    published:a.published_at,category:cat,uuid:a.uuid||a.url,
  }));
}

async function fetchRSS(cat){
  const feedUrl=GOOGLE_RSS[cat]||GOOGLE_RSS.general;
  const proxyUrl=RSS_PROXY+encodeURIComponent(feedUrl);
  const res=await fetch(proxyUrl);
  const json=await res.json();
  const parser=new DOMParser();
  const xml=parser.parseFromString(json.contents,'text/xml');
  const items=Array.from(xml.querySelectorAll('item'));
  hasMore=false;
  return items.slice(0,30).map(item=>{
    const rawTitle=item.querySelector('title')?.textContent||'';
    const link=item.querySelector('link')?.textContent||'';
    const desc=item.querySelector('description')?.textContent||'';
    const pubDate=item.querySelector('pubDate')?.textContent||'';
    const parts=rawTitle.split(' - ');
    const source=parts.length>1?parts[parts.length-1]:extractDomain(link);
    const title=parts.length>1?parts.slice(0,-1).join(' - '):rawTitle;
    const cleanDesc=desc.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/gi,' ').trim();
    const image=extractImg(desc);
    return{title,description:cleanDesc,url:link,image,source,published:pubDate?new Date(pubDate).toISOString():new Date().toISOString(),category:cat,uuid:link};
  }).filter(a=>a.title&&a.url);
}

function extractImg(html){
  const m=html.match(/src=["']([^"']+\.(?:jpg|jpeg|png|webp)[^"']*)/i);
  return m?m[1]:null;
}

function toggleSearchBar(){
  const bar=document.getElementById('searchBar');
  const btn=document.getElementById('searchToggleBtn');
  const showing=bar.style.display!=='none';
  bar.style.display=showing?'none':'flex';
  btn.classList.toggle('on',!showing);
  if(!showing)setTimeout(()=>document.getElementById('searchInput').focus(),200);
}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  searchMode=true;
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('on'));
  const area=document.getElementById('contentArea');
  area.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:48px 0;color:var(--text3);font-size:13px;font-weight:600"><div class="spinner"></div> Searching…</div>`;
  try{
    let articles=[];
    if(USE_RSS){
      const feedUrl=`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`;
      const res=await fetch(RSS_PROXY+encodeURIComponent(feedUrl));
      const json=await res.json();
      const parser=new DOMParser();
      const xml=parser.parseFromString(json.contents,'text/xml');
      articles=Array.from(xml.querySelectorAll('item')).slice(0,30).map(item=>{
        const rawTitle=item.querySelector('title')?.textContent||'';
        const link=item.querySelector('link')?.textContent||'';
        const desc=item.querySelector('description')?.textContent||'';
        const pubDate=item.querySelector('pubDate')?.textContent||'';
        const parts=rawTitle.split(' - ');
        const source=parts.length>1?parts[parts.length-1]:extractDomain(link);
        const title=parts.length>1?parts.slice(0,-1).join(' - '):rawTitle;
        return{title,description:desc.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/gi,' ').trim(),url:link,image:extractImg(desc),source,published:pubDate?new Date(pubDate).toISOString():new Date().toISOString(),category:'search',uuid:link};
      }).filter(a=>a.title&&a.url);
    }else{
      const params=new URLSearchParams({api_token:API_KEY,search:q,language:'en',limit:25});
      const apiUrl=`${THENEWSAPI_BASE}/news/all?${params}`;
      const res=await fetch(`${RSS_PROXY}${encodeURIComponent(apiUrl)}`);
      const outer=await res.json();
      const data=JSON.parse(outer.contents);
      articles=(data.data||[]).map(a=>({title:a.title,description:a.description||a.snippet||'',url:a.url,image:a.image_url||null,source:a.source||extractDomain(a.url),published:a.published_at,category:'search',uuid:a.uuid||a.url}));
    }
    area.innerHTML=`<div style="font-size:11px;color:var(--text3);font-weight:600;margin-bottom:12px">${articles.length} results for "<strong style="color:var(--text)">${escHtml(q)}</strong>"</div>`;
    if(!articles.length){area.innerHTML+=`<div class="empty-state"><i class="fa-solid fa-face-sad-tear empty-ico"></i><div class="empty-title">No Results</div><p class="empty-sub">Try a different search term</p></div>`;return;}
    renderArticles(articles,area,false);
    toast(`${articles.length} results found`);
  }catch(e){
    area.innerHTML=`<div class="empty-state"><i class="fa-solid fa-wifi empty-ico"></i><div class="empty-title">Search Failed</div><p class="empty-sub">Check your connection and try again</p></div>`;
  }
}

document.getElementById('searchInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

function renderArticles(articles,container,reset){
  if(!articles.length)return;
  if(reset&&articles.length>0)container.appendChild(buildHeroCard(articles[0]));
  if(reset&&articles.length>3){
    const sec=document.createElement('div');sec.className='section';
    sec.innerHTML='<div class="sec-hd"><div class="sec-title"><div class="sec-bar"></div> Trending</div></div>';
    const row=document.createElement('div');row.className='news-row';
    articles.slice(1,7).forEach(a=>row.appendChild(buildRowCard(a)));
    sec.appendChild(row);container.appendChild(sec);
  }
  const sec2=document.createElement('div');sec2.className='section';
  if(reset){sec2.innerHTML='<div class="sec-hd"><div class="sec-title"><div class="sec-bar"></div> Latest Stories</div></div>';}
  const list=document.createElement('div');list.className='news-list';
  articles.slice(reset?7:0).forEach(a=>list.appendChild(buildNewsCard(a)));
  sec2.appendChild(list);container.appendChild(sec2);
  if(hasMore&&!USE_RSS&&!searchMode){
    const btn=document.createElement('button');btn.className='load-more-btn';
    btn.innerHTML='<i class="fa-solid fa-arrow-down"></i> Load More';
    btn.onclick=()=>{btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';loadCategory(currentCat,false);};
    container.appendChild(btn);
  }
}

function buildHeroCard(a){
  const card=document.createElement('div');card.className='hero-card';
  card.innerHTML=`
    ${a.image?`<img class="hero-img" src="${a.image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'hero-img-ph\\'><i class=\\'fa-solid fa-newspaper\\'></i></div>'">`:`<div class="hero-img-ph"><i class="fa-solid fa-newspaper"></i></div>`}
    <div class="hero-grad"></div>
    <div class="hero-content">
      <div class="hero-source-row">
        <span class="hero-source">${escHtml(a.source)}</span>
        <span class="hero-cat-badge">${a.category||'News'}</span>
        <span class="hero-time">${timeAgo(a.published)}</span>
      </div>
      <div class="hero-title">${escHtml(a.title)}</div>
      ${a.description?`<div class="hero-desc">${escHtml(a.description)}</div>`:''}
    </div>`;
  card.onclick=()=>openReader(a);return card;
}

function buildNewsCard(a){
  const card=document.createElement('div');card.className='news-card';
  const saved=isSaved(a.uuid);
  const safeJson=escAttr(JSON.stringify(a));
  card.innerHTML=`
    ${a.image?`<img class="news-card-img" src="${a.image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'news-card-img-ph\\'><i class=\\'fa-solid fa-newspaper\\'></i></div>'">`:`<div class="news-card-img-ph"><i class="fa-solid fa-newspaper"></i></div>`}
    <div class="news-card-body">
      <div>
        <div class="news-card-meta">
          <span class="news-source">${escHtml(a.source)}</span>
          <span class="news-dot"></span>
          <span class="news-time">${timeAgo(a.published)}</span>
          <span class="news-cat">${a.category||'News'}</span>
        </div>
        <div class="news-title">${escHtml(a.title)}</div>
      </div>
      <div class="news-footer">
        <span class="news-read-btn"><i class="fa-solid fa-arrow-right" style="font-size:8px"></i> Read More</span>
        <button class="news-save-btn ${saved?'on':''}" onclick="event.stopPropagation();toggleSaveCard(this,'${safeJson}')">
          <i class="fa-${saved?'solid':'regular'} fa-bookmark"></i>
        </button>
      </div>
    </div>`;
  card.addEventListener('click',e=>{if(e.target.closest('.news-save-btn'))return;openReader(a);});
  return card;
}

function buildRowCard(a){
  const card=document.createElement('div');card.className='row-card';
  card.innerHTML=`
    ${a.image?`<img class="row-card-img" src="${a.image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'row-card-img-ph\\'><i class=\\'fa-solid fa-newspaper\\'></i></div>'">`:`<div class="row-card-img-ph"><i class="fa-solid fa-newspaper"></i></div>`}
    <div class="row-card-body">
      <div class="row-card-source">${escHtml(a.source)}</div>
      <div class="row-card-title">${escHtml(a.title)}</div>
      <div class="row-card-time">${timeAgo(a.published)}</div>
    </div>`;
  card.onclick=()=>openReader(a);return card;
}

function openReader(a){
  currentArticle=a;
  document.getElementById('readerImgWrap').innerHTML=a.image?`<img class="reader-img" src="${a.image}" alt="" onerror="this.style.display='none'">` :'';
  document.getElementById('readerMeta').innerHTML=`<span class="reader-source">${escHtml(a.source)}</span><span class="reader-time"><i class="fa-regular fa-clock" style="font-size:9px"></i> ${timeAgo(a.published)}</span><span class="reader-cat">${a.category||'News'}</span>`;
  document.getElementById('readerTitle').textContent=a.title;
  document.getElementById('readerDesc').textContent=a.description||'Tap "Read Full Article" to view the complete story.';
  const btn=document.getElementById('readerSaveBtn');
  const saved=isSaved(a.uuid);
  btn.innerHTML=saved?'<i class="fa-solid fa-bookmark"></i> Saved':'<i class="fa-regular fa-bookmark"></i> Save';
  btn.classList.toggle('on',saved);
  document.body.style.overflow='hidden';
  document.getElementById('readerModal').classList.add('open');
  document.getElementById('readerBox').scrollTop=0;
}
function closeReader(){document.getElementById('readerModal').classList.remove('open');document.body.style.overflow='';}
function openFullArticle(){if(currentArticle?.url)window.open(currentArticle.url,'_blank');}
function shareArticle(){
  if(!currentArticle)return;
  if(navigator.share){navigator.share({title:currentArticle.title,url:currentArticle.url}).catch(()=>{});}
  else{navigator.clipboard?.writeText(currentArticle.url).then(()=>toast('Link copied!')).catch(()=>{});}
}

function isSaved(uuid){return savedArticles.some(a=>a.uuid===uuid);}
function toggleSave(article){
  const idx=savedArticles.findIndex(a=>a.uuid===article.uuid);
  const adding=idx===-1;
  if(adding)savedArticles.unshift(article);
  else savedArticles.splice(idx,1);
  localStorage.setItem('snSaved',JSON.stringify(savedArticles.slice(0,100)));
  toast(adding?'✓ Article saved':'Removed from saved');
  return adding;
}
function toggleSaveFromReader(){
  if(!currentArticle)return;
  const added=toggleSave(currentArticle);
  const btn=document.getElementById('readerSaveBtn');
  btn.innerHTML=added?'<i class="fa-solid fa-bookmark"></i> Saved':'<i class="fa-regular fa-bookmark"></i> Save';
  btn.classList.toggle('on',added);
}
function toggleSaveCard(btn,json){
  try{
    const a=JSON.parse(json);
    const added=toggleSave(a);
    btn.innerHTML=`<i class="fa-${added?'solid':'regular'} fa-bookmark"></i>`;
    btn.classList.toggle('on',added);
  }catch(e){}
}

function openSaved(){
  const body=document.getElementById('savedBody');body.innerHTML='';
  if(!savedArticles.length){
    body.innerHTML='<div class="empty-state"><i class="fa-regular fa-bookmark empty-ico"></i><div class="empty-title">No Saved Articles</div><p class="empty-sub">Tap the bookmark on any article to save it here</p></div>';
  }else{
    const list=document.createElement('div');list.className='news-list';
    savedArticles.forEach(a=>list.appendChild(buildNewsCard(a)));
    body.appendChild(list);
  }
  document.body.style.overflow='hidden';
  document.getElementById('savedPanel').classList.add('open');
}
function closeSaved(){document.getElementById('savedPanel').classList.remove('open');document.body.style.overflow='';}

function extractDomain(url){try{return new URL(url).hostname.replace('www.','');}catch(e){return'Unknown';}}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function timeAgo(iso){
  if(!iso)return'';
  const diff=Date.now()-new Date(iso).getTime();
  const m=Math.floor(diff/60000),h=Math.floor(diff/3600000),d=Math.floor(diff/86400000);
  if(m<1)return'Just now';if(m<60)return`${m}m ago`;if(h<24)return`${h}h ago`;
  if(d<7)return`${d}d ago`;
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg;t.className='toast vis';
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('vis'),2600);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('readerModal').classList.contains('open'))closeReader();
    else if(document.getElementById('savedPanel').classList.contains('open'))closeSaved();
  }
  if(e.key==='/'&&e.target.tagName!=='INPUT'){e.preventDefault();toggleSearchBar();}
});
</script>
