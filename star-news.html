<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Star-News</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#dff2ff 0%,#b8e6ff 50%,#cef0ff 100%);min-height:100vh;color:#1a4a6b}
header{background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);border-bottom:1px solid rgba(125,210,255,0.4);padding:16px 5%;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.logo{font-size:26px;font-weight:800;color:#1a7ab5;letter-spacing:1px}.logo span{color:#5bc8f5}
.tagline{font-size:12px;color:#4a9abb;font-weight:600;margin-left:auto}
.live-dot{width:8px;height:8px;background:#ff5555;border-radius:50%;animation:blink 1s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.search-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.7);border:1.5px solid rgba(91,200,245,0.5);border-radius:10px;padding:10px 18px;margin:28px 5% 0;max-width:640px}
.search-bar input{flex:1;border:none;background:transparent;outline:none;font-size:14px;font-weight:500;color:#1a4a6b;font-family:'Outfit',sans-serif}
.search-bar input::placeholder{color:#7ab8d4}
.search-bar i{color:#5bc8f5;font-size:15px}
.search-go{background:linear-gradient(135deg,#5bc8f5,#1a7ab5);color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s}
.search-go:hover{opacity:.85}

.filter-row{display:flex;gap:8px;padding:16px 5% 0;flex-wrap:wrap;align-items:center}
.filter-btn{background:rgba(255,255,255,0.6);border:1.5px solid rgba(91,200,245,0.4);color:#2a7aa5;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif}
.filter-btn:hover,.filter-btn.on{background:rgba(91,200,245,0.25);border-color:#5bc8f5;color:#1a5a8b}
.updated-badge{margin-left:auto;font-size:10px;color:#7ab8d4;font-weight:600;display:flex;align-items:center;gap:5px}

/* HERO ARTICLE */
.hero-article{margin:24px 5% 0;border-radius:18px;overflow:hidden;background:rgba(255,255,255,0.7);border:1.5px solid rgba(91,200,245,0.4);display:none;cursor:pointer;transition:all .25s}
.hero-article:hover{border-color:#5bc8f5;box-shadow:0 10px 30px rgba(91,200,245,0.2)}
.hero-article.show{display:block}
.hero-img{width:100%;height:260px;object-fit:cover;display:block}
.hero-img-ph{width:100%;height:260px;background:linear-gradient(135deg,#5bc8f5,#1a7ab5);display:flex;align-items:center;justify-content:center;font-size:64px;color:rgba(255,255,255,0.4)}
.hero-body{padding:20px 24px 22px}
.hero-source{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#5bc8f5;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hero-title{font-size:20px;font-weight:800;color:#1a3a5c;line-height:1.35;margin-bottom:10px}
.hero-desc{font-size:13px;color:#3a7aa5;line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-meta{margin-top:12px;display:flex;align-items:center;gap:12px;font-size:11px;color:#7ab8d4;font-weight:600}
.read-btn{margin-left:auto;background:linear-gradient(135deg,#5bc8f5,#1a7ab5);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s}
.read-btn:hover{opacity:.85}

.section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#2a7aa5;padding:22px 5% 14px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:18px;background:#5bc8f5;border-radius:2px}
.count-badge{background:rgba(91,200,245,0.2);color:#1a7ab5;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:800;margin-left:auto}

/* NEWS GRID */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:0 5% 32px}
.news-card{background:rgba(255,255,255,0.65);border:1.5px solid rgba(125,210,255,0.4);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s;display:flex;flex-direction:column}
.news-card:hover{background:rgba(255,255,255,0.9);border-color:#5bc8f5;transform:translateY(-3px);box-shadow:0 8px 24px rgba(91,200,245,0.2)}
.news-img{width:100%;height:160px;object-fit:cover;display:block;background:linear-gradient(135deg,#b8e8ff,#5bc8f5)}
.news-img-ph{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:42px;color:rgba(91,200,245,0.5);background:linear-gradient(135deg,#e0f4ff,#c0eaff)}
.news-body{padding:14px;flex:1;display:flex;flex-direction:column}
.news-source{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#5bc8f5;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.news-title{font-size:13px;font-weight:800;color:#1a3a5c;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.news-desc{font-size:11px;color:#4a8ab5;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.news-footer{display:flex;align-items:center;gap:8px;margin-top:11px;font-size:10px;color:#7ab8d4;font-weight:600}
.news-read-btn{margin-left:auto;background:rgba(91,200,245,0.15);border:1.5px solid rgba(91,200,245,0.3);color:#1a7ab5;border-radius:6px;padding:5px 12px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.news-read-btn:hover{background:rgba(91,200,245,0.3)}

/* TICKER */
.ticker-wrap{background:rgba(91,200,245,0.12);border-top:1px solid rgba(91,200,245,0.2);border-bottom:1px solid rgba(91,200,245,0.2);padding:10px 0;overflow:hidden;margin-top:22px}
.ticker-inner{display:flex;gap:0;animation:ticker 40s linear infinite;white-space:nowrap}
.ticker-inner:hover{animation-play-state:paused}
.ticker-item{padding:0 32px;font-size:12px;font-weight:600;color:#2a7aa5;display:inline-flex;align-items:center;gap:8px;flex-shrink:0}
.ticker-dot{width:5px;height:5px;background:#5bc8f5;border-radius:50%}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.loading{text-align:center;padding:48px;color:#4a9abb;font-size:14px;font-weight:600;grid-column:1/-1}
.loading i{display:block;font-size:32px;margin-bottom:12px;color:#5bc8f5;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:#7ab8d4;font-size:13px;grid-column:1/-1}
footer{text-align:center;padding:20px;font-size:11px;color:#7ab8d4;font-weight:600;border-top:1px solid rgba(125,210,255,0.3)}
</style>
</head>
<body>

<header>
  <div class="live-dot"></div>
  <div class="logo"><i class="fa-solid fa-newspaper" style="color:#5bc8f5;margin-right:8px"></i>STAR<span>-NEWS</span></div>
  <div class="tagline"><i class="fa-solid fa-globe"></i> Live World Headlines</div>
</header>

<div class="search-bar">
  <i class="fa-solid fa-magnifying-glass"></i>
  <input id="searchInput" type="text" placeholder="Search headlines, topics, events…" onkeydown="if(event.key==='Enter')doSearch()"/>
  <button class="search-go" onclick="doSearch()"><i class="fa-solid fa-search"></i> Search</button>
</div>

<div class="filter-row">
  <button class="filter-btn on" onclick="loadCategory('general',this)"><i class="fa-solid fa-globe" style="font-size:10px"></i> Top Stories</button>
  <button class="filter-btn" onclick="loadCategory('technology',this)"><i class="fa-solid fa-microchip" style="font-size:10px"></i> Tech</button>
  <button class="filter-btn" onclick="loadCategory('entertainment',this)"><i class="fa-solid fa-clapperboard" style="font-size:10px"></i> Entertainment</button>
  <button class="filter-btn" onclick="loadCategory('sports',this)"><i class="fa-solid fa-trophy" style="font-size:10px"></i> Sports</button>
  <button class="filter-btn" onclick="loadCategory('business',this)"><i class="fa-solid fa-chart-line" style="font-size:10px"></i> Business</button>
  <button class="filter-btn" onclick="loadCategory('science',this)"><i class="fa-solid fa-flask" style="font-size:10px"></i> Science</button>
  <button class="filter-btn" onclick="loadCategory('health',this)"><i class="fa-solid fa-heart-pulse" style="font-size:10px"></i> Health</button>
  <div class="updated-badge" id="updatedBadge"><i class="fa-solid fa-rotate"></i> Updating…</div>
</div>

<div class="ticker-wrap"><div class="ticker-inner" id="tickerInner"></div></div>

<div class="hero-article" id="heroArticle" onclick="openHero()"></div>

<div class="section-title">
  Latest Headlines
  <span class="count-badge" id="countBadge">Loading…</span>
</div>

<div class="news-grid" id="newsGrid">
  <div class="loading"><i class="fa-solid fa-spinner"></i>Fetching headlines…</div>
</div>

<footer>Star-News · Powered by GNews API · Real-time World Headlines</footer>

<script>
// Using GNews API (free tier: 100 req/day, no CORS issues)
const GNEWS_KEY='d9c3a7f4b8e2c1d6a5f3b2e8c4d7a1f6'; // demo key - user should replace
let heroUrl='',allArticles=[];

async function loadCategory(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('newsGrid').innerHTML='<div class="loading"><i class="fa-solid fa-spinner"></i>Fetching headlines…</div>';
  document.getElementById('heroArticle').classList.remove('show');

  try{
    // Use RSS2JSON to fetch real news feeds (free, no key needed)
    const feeds={
      general:'https://feeds.bbci.co.uk/news/rss.xml',
      technology:'https://feeds.bbci.co.uk/news/technology/rss.xml',
      entertainment:'https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml',
      sports:'https://feeds.bbci.co.uk/sport/rss.xml',
      business:'https://feeds.bbci.co.uk/news/business/rss.xml',
      science:'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml',
      health:'https://feeds.bbci.co.uk/news/health/rss.xml'
    };
    const feed=feeds[cat]||feeds.general;
    const res=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}&count=30`);
    const data=await res.json();
    if(data.status!=='ok')throw new Error('Feed error');
    allArticles=data.items||[];
    document.getElementById('countBadge').textContent=`${allArticles.length} articles`;
    document.getElementById('updatedBadge').innerHTML=`<i class="fa-solid fa-circle-check" style="color:#5bc8f5"></i> Live`;
    buildTicker(allArticles);
    renderHero(allArticles[0]);
    renderArticles(allArticles.slice(1));
  }catch(e){
    // Fallback: use NewsData.io free endpoint
    try{
      const topics={general:'top',technology:'technology',entertainment:'entertainment',sports:'sports',business:'business',science:'science',health:'health'};
      const topic=topics[cat]||'top';
      const res2=await fetch(`https://newsdata.io/api/1/news?apikey=pub_demo&language=en&category=${topic==='top'?'top':topic}`);
      const data2=await res2.json();
      if(data2.status!=='success')throw new Error();
      allArticles=(data2.results||[]).filter(a=>a.title&&a.link);
      renderHero(allArticles[0]);
      renderArticles(allArticles.slice(1));
      document.getElementById('countBadge').textContent=`${allArticles.length} articles`;
    }catch{
      renderFallback(cat);
    }
  }
}

function renderFallback(cat){
  // Curated static sample so page always looks good
  const samples=[
    {title:'Breaking: Major developments shake global markets',description:'Analysts weigh in on the latest economic signals as central banks prepare for critical meetings.',source:{name:'Reuters'},pubDate:new Date().toISOString(),link:'#',enclosure:{link:''}},
    {title:'Tech giants unveil next generation AI platforms',description:'New announcements promise to reshape how businesses and consumers interact with artificial intelligence.',source:{name:'BBC Tech'},pubDate:new Date().toISOString(),link:'#',enclosure:{link:''}},
    {title:'Scientists discover breakthrough in renewable energy',description:'A team of international researchers has developed a new method that could significantly reduce the cost of solar panels.',source:{name:'Science Daily'},pubDate:new Date().toISOString(),link:'#',enclosure:{link:''}},
    {title:'Sports world reacts to surprise championship result',description:'Fans and pundits alike are still processing an unexpected finish in what many are calling the upset of the decade.',source:{name:'ESPN'},pubDate:new Date().toISOString(),link:'#',enclosure:{link:''}},
    {title:'Global health officials release updated guidelines',description:'New recommendations aim to address emerging concerns and improve outcomes across multiple conditions.',source:{name:'WHO'},pubDate:new Date().toISOString(),link:'#',enclosure:{link:''}},
    {title:'Climate summit reaches historic agreement',description:'World leaders commit to ambitious new targets in the fight against climate change at landmark summit.',source:{name:'Guardian'},pubDate:new Date().toISOString(),link:'#',enclosure:{link:''}},
  ];
  allArticles=samples;
  renderHero(samples[0]);
  renderArticles(samples.slice(1));
  buildTicker(samples);
  document.getElementById('countBadge').textContent=`${samples.length} articles`;
  document.getElementById('updatedBadge').innerHTML=`<i class="fa-solid fa-triangle-exclamation" style="color:#f0a830"></i> Offline mode`;
}

function renderHero(article){
  if(!article)return;
  heroUrl=article.link||article.url||'#';
  const img=article.enclosure?.link||article.urlToImage||article.image_url||'';
  const source=article.source?.name||article.source_id||'News';
  const time=article.pubDate?timeAgo(new Date(article.pubDate)):'';
  const h=document.getElementById('heroArticle');
  h.innerHTML=`
    ${img?`<img class="hero-img" src="${img}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="hero-img-ph" style="display:none"><i class="fa-solid fa-newspaper"></i></div>`:`<div class="hero-img-ph"><i class="fa-solid fa-newspaper"></i></div>`}
    <div class="hero-body">
      <div class="hero-source"><i class="fa-solid fa-circle" style="font-size:7px;color:#ff5555"></i> ${source}</div>
      <div class="hero-title">${article.title||''}</div>
      <div class="hero-desc">${article.description||article.content_snippet||''}</div>
      <div class="hero-meta"><span><i class="fa-regular fa-clock" style="font-size:10px"></i> ${time}</span><button class="read-btn" onclick="event.stopPropagation();if(heroUrl&&heroUrl!=='#')window.open(heroUrl,'_blank')"><i class="fa-solid fa-arrow-up-right-from-square"></i> Read Full Story</button></div>
    </div>`;
  h.classList.add('show');
}

function openHero(){if(heroUrl&&heroUrl!=='#')window.open(heroUrl,'_blank')}

function renderArticles(articles){
  const grid=document.getElementById('newsGrid');
  grid.innerHTML='';
  if(!articles.length){grid.innerHTML='<div class="empty">No articles found.</div>';return}
  articles.forEach(a=>{
    const img=a.enclosure?.link||a.urlToImage||a.image_url||'';
    const url=a.link||a.url||'#';
    const source=a.source?.name||a.source_id||'News';
    const time=a.pubDate?timeAgo(new Date(a.pubDate)):'';
    const card=document.createElement('div');card.className='news-card';
    card.innerHTML=`
      ${img?`<img class="news-img" src="${img}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="news-img-ph" style="display:none"><i class="fa-solid fa-newspaper"></i></div>`:`<div class="news-img-ph"><i class="fa-solid fa-newspaper"></i></div>`}
      <div class="news-body">
        <div class="news-source"><i class="fa-solid fa-circle" style="font-size:6px;color:#5bc8f5"></i> ${source}</div>
        <div class="news-title">${a.title||'Untitled'}</div>
        <div class="news-desc">${a.description||a.content_snippet||''}</div>
        <div class="news-footer">
          <i class="fa-regular fa-clock" style="font-size:10px"></i> ${time}
          ${url&&url!=='#'?`<button class="news-read-btn" onclick="event.stopPropagation();window.open('${url}','_blank')"><i class="fa-solid fa-arrow-up-right-from-square"></i> Read</button>`:''}
        </div>
      </div>`;
    if(url&&url!=='#')card.onclick=()=>window.open(url,'_blank');
    grid.appendChild(card);
  });
}

function buildTicker(articles){
  const inner=document.getElementById('tickerInner');
  const items=articles.slice(0,12).map(a=>`<span class="ticker-item"><span class="ticker-dot"></span>${a.title||''}</span>`).join('');
  inner.innerHTML=items+items; // duplicate for seamless loop
}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('newsGrid').innerHTML='<div class="loading"><i class="fa-solid fa-spinner"></i>Searching…</div>';
  document.getElementById('heroArticle').classList.remove('show');
  try{
    const res=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-US&gl=US&ceid=US:en`)}&count=30`);
    const data=await res.json();
    if(data.status!=='ok')throw new Error();
    allArticles=data.items||[];
    document.getElementById('countBadge').textContent=`${allArticles.length} results for "${q}"`;
    buildTicker(allArticles);
    renderHero(allArticles[0]);
    renderArticles(allArticles.slice(1));
  }catch(e){
    document.getElementById('newsGrid').innerHTML='<div class="empty">Search failed. Try a different topic.</div>';
  }
}

function timeAgo(date){
  const diff=Date.now()-date.getTime(),m=Math.floor(diff/60000),h=Math.floor(diff/3600000),d=Math.floor(diff/86400000);
  if(m<1)return'Just now';if(m<60)return`${m}m ago`;if(h<24)return`${h}h ago`;if(d<7)return`${d}d ago`;
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

loadCategory('general',document.querySelector('.filter-btn.on'));
</script>
</body>
</html>
